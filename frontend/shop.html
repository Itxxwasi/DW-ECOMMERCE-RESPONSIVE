<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Categories - D.Watson Pharmacy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/global-fonts.css?v=1">
    <link rel="stylesheet" href="/css/style.css?v=2">
    <link rel="stylesheet" href="/css/dwatson-styles.css?v=2">
    <link rel="stylesheet" href="/css/home.css?v=35">
    <link rel="stylesheet" href="/css/mobile-fix.css?v=1">
    <link rel="stylesheet" href="/css/global-responsive.css?v=1">
    <link rel="stylesheet" href="/css/professional-navbar.css?v=1">
</head>
<body>
    <header id="header" class="header logo-center_2l header-2-lines">
        <div class="header-main-wrap">
            <div class="header-top">
                <div class="container">
                    <div class="row align-items-center">
                        <div class="col-3 d-lg-none">
                            <button class="js-mobile-menu btn p-0 border-0 bg-transparent" type="button" aria-label="Toggle navigation">
                                <span class="icon">
                                    <i class="fas fa-bars" style="color: #ffffff; font-size: 22px;"></i>
                                </span>
                            </button>
                        </div>
                        <div class="header-logo hide-desktop flex-1">
                            <a href="/" class="site-header__logo-image" title="D.Watson">
                                <img src="/images/logo.png" alt="D.Watson" loading="eager" class="header-logo-img">
                            </a>
                        </div>
                        <div class="header-logo hide-mobile col-md-6">
                            <h1>
                                <a href="/" class="site-header__logo-image" aria-label="D.Watson">
                                    <img src="/images/logo.png" alt="D.Watson" loading="eager" class="header-logo-img">
                                </a>
                            </h1>
                        </div>
                        <div class="header-top-meta col-md-3 col-9">
                            <ul class="header-control">
                                <li class="item-list signin">
                                    <a href="/login.html" class="header-icon" title="Login">
                                        <span class="icon"><i class="far fa-user"></i></span>
                                    </a>
                                </li>
                                <li class="item-list cart-block">
                                    <a href="/cart.html" class="header-icon cart-icon" title="Cart">
                                        <span class="icon"><i class="fas fa-shopping-bag"></i></span>
                                        <span class="header__counter cart-count">0</span>
                                    </a>
                                </li>
                                <li class="header_search hide-desktop">
                                    <a href="#" class="mobile-nav-item push_side" data-id="#search_pupop" data-page="search">
                                        <span class="icon"><i class="fas fa-search"></i></span>
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
            <div class="header-nav">
                <div class="header-nav-inner">
                    <div class="container-wapper">
                        <nav class="professional-nav">
                            <ul class="nav-menu" id="menu-main-menu">
                                <li class="nav-item">
                                    <a href="/products.html?filter=discounted" class="nav-link">Sale</a>
                                </li>
                            </ul>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="home-section" style="padding-top: 10px;">
            <h2 class="section-title">Shop by Category</h2>
            <p class="section-subtitle">Browse all categories in a mobile-first grid</p>
            <div class="category-grid" id="shopCategoryGrid"></div>
        </section>
    </main>

    <footer class="footer" id="siteFooter"></footer>

    <!-- Mobile Menu Panel -->
    <div class="mobile-menu-panel" id="mobileMenuPanel">
        <div class="mobile-menu-content">
            <button class="mobile-menu-close" type="button" aria-label="Close navigation">&times;</button>
            <ul class="mobile-menu-list" id="mobileMenuList">
                <li class="menu-item">
                    <a href="/products.html?filter=discounted" class="cms-item-title">Sale</a>
                </li>
                <!-- Categories will be loaded dynamically here -->
            </ul>
        </div>
    </div>

    <nav class="mobile-bottom-nav">
        <a href="/" class="mobile-nav-item" data-page="home">
            <i class="fas fa-home"></i>
            <span class="mobile-nav-label">Home</span>
        </a>
        <a href="/products.html" class="mobile-nav-item active" data-page="shop">
            <i class="fas fa-th-large"></i>
            <span class="mobile-nav-label">Shop</span>
        </a>
        <a href="/cart.html" class="mobile-nav-item" data-page="cart">
            <i class="fas fa-shopping-bag"></i>
            <span class="mobile-nav-label">Cart</span>
            <span class="mobile-nav-badge cart-count">0</span>
        </a>
        <a href="#" class="mobile-nav-item push_side" data-id="#search_pupop" data-page="search">
            <i class="fas fa-search"></i>
            <span class="mobile-nav-label">Search</span>
        </a>
        <a href="/login.html" class="mobile-nav-item" data-page="account">
            <i class="far fa-user"></i>
            <span class="mobile-nav-label">Account</span>
        </a>
    </nav>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/main.js?v=10" defer></script>
    <script src="/js/shop.js" defer></script>
</body>
</html>
